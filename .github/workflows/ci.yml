name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for branch/PR refs; let tag builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Minimal permissions by default; individual jobs add only what they need.
permissions:
  contents: read

env:
  IMAGE: 1121citrus/bats-kcov

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    uses: 1121citrus/shared-github-workflows/.github/workflows/lint.yml@main

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  # Build image for scanning and smoke tests.  The bats test suite uses static
  # analysis so it does not require the Docker image and runs in parallel with
  # (not after) build.
  build:
    needs: lint
    uses: 1121citrus/shared-github-workflows/.github/workflows/build.yml@main
    with:
      image: 1121citrus/bats-kcov

  # ── Stage 3: Test ──────────────────────────────────────────────────────────
  # Bats tests mount the project source read-only into the bats container.
  # All tests are static (Dockerfile analysis) so no host packages are
  # required.  Runs in parallel with build after lint.
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run bats tests
        run: |
          docker run -i --rm \
            -v "$PWD:/code:ro" \
            -w /code \
            bats/bats:1.13.0 \
              test/01-dockerfile.bats \
              test/02-image-metadata.bats \
              test/03-build.bats \
              test/04-bats-coverage.bats

  # ── Stage 3b: Image smoke test ─────────────────────────────────────────────
  # Verify that kcov, bats, and jq are present and executable in the built
  # image.  Catches packaging/runtime regressions not visible in static tests.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/image.tar.gz | docker load
      - name: Verify kcov is available
        run: docker run --rm "$IMAGE:latest" kcov --version
      - name: Verify bats is available
        run: docker run --rm "$IMAGE:latest" bats --version
      - name: Verify jq is available
        run: docker run --rm "$IMAGE:latest" jq --version
      - name: Verify entrypoint is cleared (null)
        # ENTRYPOINT [] in a Dockerfile is stored by Docker as a nil Go slice,
        # which json-encodes as null — not [].  A non-null value here means the
        # kcov/kcov base entrypoint was not successfully reset.
        run: |
          docker inspect --format '{{json .Config.Entrypoint}}' "$IMAGE:latest" \
            | grep -Fx 'null'
      - name: Verify bats-coverage is available
        run: docker run --rm "$IMAGE:latest" bash -c 'bats-coverage 2>&1 | grep -q "^Usage:"'
      - name: Verify bash is directly invocable (entrypoint not interfering)
        run: docker run --rm "$IMAGE:latest" bash --version > /dev/null
      - name: E2E — bats-coverage runs tests and produces coverage output
        # Mounts the project source read-only.  Runs a real bats test file
        # under kcov and verifies that a coverage report is printed and that
        # the exit status correctly reflects test outcomes.
        run: |
          docker run --rm \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v "$PWD:/code:ro" \
            -w /code \
            "$IMAGE:latest" \
            bats-coverage \
              --src /code \
              --include /code/build,/code/bin/bats-coverage \
              test/03-build.bats 2>&1 | grep -q 'Overall:'

  # ── Stage 4: Security scan ─────────────────────────────────────────────────
  scan:
    needs: build
    uses: 1121citrus/shared-github-workflows/.github/workflows/scan.yml@main
    with:
      image: 1121citrus/bats-kcov

  # ── Stage 5: Push to Docker Hub ────────────────────────────────────────────
  push:
    needs: [scan, smoke-test, test]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/staging'
      )
    uses: 1121citrus/shared-github-workflows/.github/workflows/push.yml@main
    with:
      image: 1121citrus/bats-kcov
    secrets: inherit
